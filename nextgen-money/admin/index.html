<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextGen Money — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f5f0ed;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ---- LOGIN ---- */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }
    .login-screen h1 { font-size: 2rem; letter-spacing: 0.15em; font-weight: 400; }
    .login-screen p { color: #666; font-size: 0.9rem; }

    .btn-github {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #1a1a1a;
      color: #f5f0ed;
      padding: 0.9rem 2rem;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-github:hover { background: #333; }

    /* ---- LAYOUT ---- */
    #adminPanel {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      color: #f5f0ed;
      padding: 0.9rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 20;
    }
    header h1 { font-size: 0.85rem; letter-spacing: 0.2em; font-weight: 400; }

    .header-right { display: flex; gap: 0.75rem; align-items: center; }

    .save-btn {
      background: #b8975a;
      color: #fff;
      border: none;
      padding: 0.55rem 1.5rem;
      cursor: pointer;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #a07a40; }
    .save-btn:disabled { background: #999; cursor: not-allowed; }

    .logout-btn {
      background: none;
      border: 1px solid rgba(245,240,237,0.3);
      color: #f5f0ed;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .logout-btn:hover { border-color: #f5f0ed; }

    .save-status {
      font-size: 0.72rem;
      color: rgba(245,240,237,0.5);
      letter-spacing: 0.05em;
    }
    .save-status.dirty { color: #b8975a; }
    .save-status.saved { color: #7bc47b; }

    /* ---- SPLIT PANE ---- */
    .split-pane {
      display: grid;
      grid-template-columns: 420px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ---- EDITOR ---- */
    .editor-pane {
      overflow-y: auto;
      border-right: 1px solid #ddd;
      background: #f5f0ed;
    }

    .section-card {
      border-bottom: 1px solid #e0dbd7;
    }

    .section-card h2 {
      background: #2a2522;
      color: #f5f0ed;
      padding: 0.75rem 1.25rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .section-card h2:hover { background: #1a1a1a; }
    .section-card h2 .arrow { transition: transform 0.2s; font-size: 0.6rem; opacity: 0.6; }
    .section-card.collapsed h2 .arrow { transform: rotate(-90deg); }
    .section-card.collapsed .fields { display: none; }

    .fields { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    input[type="text"], textarea {
      border: 1px solid #ddd;
      padding: 0.6rem 0.8rem;
      font-size: 0.85rem;
      font-family: Georgia, serif;
      color: #1a1a1a;
      background: white;
      width: 100%;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #b8975a;
    }
    textarea { resize: vertical; min-height: 70px; }

    /* ---- PREVIEW ---- */
    .preview-pane {
      overflow: hidden;
      background: #eee;
      position: relative;
    }

    .preview-bar {
      background: #2a2522;
      color: rgba(245,240,237,0.6);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .preview-bar span { opacity: 0.4; }

    .preview-url {
      font-family: monospace;
      font-size: 0.7rem;
      color: rgba(245,240,237,0.5);
      flex: 1;
    }

    .preview-refresh {
      background: none;
      border: none;
      color: rgba(245,240,237,0.5);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
    }
    .preview-refresh:hover { color: #f5f0ed; }

    #previewFrame {
      width: 100%;
      height: calc(100% - 32px);
      border: none;
      display: block;
    }

    /* ---- STATUS TOAST ---- */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.75rem 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      z-index: 100;
      display: none;
      white-space: nowrap;
    }
    .toast.success { background: #1a1a1a; color: #f5f0ed; }
    .toast.error   { background: #8b1a1a; color: #fff; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: #888; font-size: 0.85rem; letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <h1>NEXTGEN MONEY</h1>
  <p>Admin Panel — Skráðu þig inn til að breyta efni</p>
  <a class="btn-github" href="#" id="loginBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
    Skrá inn með GitHub
  </a>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <header>
    <h1>NEXTGEN MONEY — ADMIN</h1>
    <div class="header-right">
      <span class="save-status" id="saveStatus">Allt vistað</span>
      <button class="save-btn" id="saveBtn">Vista</button>
      <button class="logout-btn" id="logoutBtn">Útskrá</button>
    </div>
  </header>

  <div class="split-pane">
    <!-- LEFT: EDITOR -->
    <div class="editor-pane" id="formContainer">
      <div class="loading">Hleður efni...</div>
    </div>

    <!-- RIGHT: PREVIEW -->
    <div class="preview-pane">
      <div class="preview-bar">
        <span>FORSKOÐUN</span>
        <span class="preview-url">nextgen-money.vercel.app</span>
        <button class="preview-refresh" id="refreshBtn" title="Uppfæra forskoðun">↺</button>
      </div>
      <iframe id="previewFrame" src="https://nextgen-money.vercel.app" title="Forskoðun"></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO = 'asalif19/my-first-site';
const FILE_PATH = 'nextgen-money/data/content.json';

let token = sessionStorage.getItem('gh_token');
let contentData = {};
let fileSha = '';

// ---- AUTH ----
document.getElementById('loginBtn').addEventListener('click', e => {
  e.preventDefault();
  window.location.href = '/api/auth';
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('gh_token');
  location.reload();
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  document.getElementById('previewFrame').src = document.getElementById('previewFrame').src;
});

const params = new URLSearchParams(location.search);
if (params.get('token')) {
  sessionStorage.setItem('gh_token', params.get('token'));
  token = params.get('token');
  history.replaceState({}, '', '/admin');
}
if (params.get('error')) {
  document.querySelector('.login-screen p').textContent = 'Villa: ' + decodeURIComponent(params.get('error'));
  document.querySelector('.login-screen p').style.color = '#c0392b';
  history.replaceState({}, '', '/admin');
}

if (token) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'flex';
  loadContent();
}

// ---- LOAD ----
async function loadContent() {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!res.ok) throw new Error('Villa við að sækja efni');
    const data = await res.json();
    fileSha = data.sha;
    contentData = JSON.parse(atob(data.content.replace(/\n/g, '')));
    renderForm();
  } catch (err) {
    document.getElementById('formContainer').innerHTML = `<div class="loading" style="color:red">${err.message}</div>`;
  }
}

// ---- RENDER ----
function renderForm() {
  const sections = [
    { key: 'hero', label: 'Hero — Forsíða', fields: [
      { k: 'eyebrow', label: 'Lítill texti', type: 'text' },
      { k: 'subtitle', label: 'Undirtitill', type: 'text' },
      { k: 'cta', label: 'Takki texti', type: 'text' }
    ]},
    { key: 'about', label: 'Home — Um síðuna', fields: [
      { k: 'intro', label: 'Kynningartexti', type: 'area' },
      { k: 'for_whom', label: 'Fyrir hvern?', type: 'area' },
      { k: 'why_matters', label: 'Af hverju fjármál skipta máli', type: 'area' },
      { k: 'goal', label: 'Markmið síðunnar', type: 'area' }
    ]},
    { key: 'save', label: 'How to Save', fields: [
      { k: 'card1_title', label: 'Kort 1 — Titill', type: 'text' },
      { k: 'card1_text', label: 'Kort 1 — Texti', type: 'area' },
      { k: 'card2_title', label: 'Kort 2 — Titill', type: 'text' },
      { k: 'card2_text', label: 'Kort 2 — Texti', type: 'area' },
      { k: 'card3_title', label: 'Kort 3 — Titill', type: 'text' },
      { k: 'card3_text', label: 'Kort 3 — Texti', type: 'area' },
      { k: 'card4_title', label: 'Kort 4 — Titill', type: 'text' },
      { k: 'card4_text', label: 'Kort 4 — Texti', type: 'area' },
      { k: 'card5_title', label: 'Kort 5 — Titill', type: 'text' },
      { k: 'card5_text', label: 'Kort 5 — Texti', type: 'area' }
    ]},
    { key: 'budget', label: 'Budget Plan', fields: [
      { k: 'what_text', label: 'Hvað er budget?', type: 'area' },
      { k: 'why_text', label: 'Af hverju hjálpar budget?', type: 'area' },
      { k: 'example_income', label: 'Tekjur', type: 'text' },
      { k: 'example_needs', label: 'Þarfir (50%)', type: 'text' },
      { k: 'example_wants', label: 'Lyst (30%)', type: 'text' },
      { k: 'example_savings', label: 'Sparnaður (20%)', type: 'text' }
    ]},
    { key: 'tips', label: 'Tips — Ráð', fields: [
      { k: 'tip1_title', label: 'Ráð 1 — Titill', type: 'text' },
      { k: 'tip1_text', label: 'Ráð 1 — Texti', type: 'area' },
      { k: 'tip2_title', label: 'Ráð 2 — Titill', type: 'text' },
      { k: 'tip2_text', label: 'Ráð 2 — Texti', type: 'area' },
      { k: 'tip3_title', label: 'Ráð 3 — Titill', type: 'text' },
      { k: 'tip3_text', label: 'Ráð 3 — Texti', type: 'area' },
      { k: 'tip4_title', label: 'Ráð 4 — Titill', type: 'text' },
      { k: 'tip4_text', label: 'Ráð 4 — Texti', type: 'area' },
      { k: 'tip5_title', label: 'Ráð 5 — Titill', type: 'text' },
      { k: 'tip5_text', label: 'Ráð 5 — Texti', type: 'area' }
    ]},
    { key: 'extra', label: 'Extra', fields: [
      { k: 'block1_text', label: 'Markhópurinn', type: 'area' },
      { k: 'block2_text', label: 'Raunverulegt dæmi', type: 'area' },
      { k: 'block3_text', label: 'Af hverju núna?', type: 'area' },
      { k: 'quote', label: 'Tilvitnun', type: 'area' },
      { k: 'quote_author', label: 'Höfundur', type: 'text' }
    ]},
    { key: 'footer', label: 'Footer', fields: [
      { k: 'tagline', label: 'Texti neðst', type: 'text' }
    ]}
  ];

  document.getElementById('formContainer').innerHTML = sections.map((sec, i) => `
    <div class="section-card ${i > 0 ? 'collapsed' : ''}">
      <h2 onclick="toggleSection(this)">
        ${sec.label}
        <span class="arrow">▾</span>
      </h2>
      <div class="fields">
        ${sec.fields.map(f => `
          <label>
            ${f.label}
            ${f.type === 'area'
              ? `<textarea data-section="${sec.key}" data-field="${f.k}">${contentData[sec.key]?.[f.k] || ''}</textarea>`
              : `<input type="text" data-section="${sec.key}" data-field="${f.k}" value="${(contentData[sec.key]?.[f.k] || '').replace(/"/g, '&quot;')}" />`
            }
          </label>
        `).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('formContainer').addEventListener('input', () => {
    const s = document.getElementById('saveStatus');
    s.textContent = 'Óvistaðar breytingar';
    s.className = 'save-status dirty';
  });
}

function toggleSection(h2) {
  h2.parentElement.classList.toggle('collapsed');
}

// ---- SAVE ----
document.getElementById('saveBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '...';

  document.querySelectorAll('[data-section][data-field]').forEach(el => {
    const sec = el.dataset.section;
    const field = el.dataset.field;
    if (!contentData[sec]) contentData[sec] = {};
    contentData[sec][field] = el.value;
  });

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Update content via admin panel',
        content: btoa(unescape(encodeURIComponent(JSON.stringify(contentData, null, 2)))),
        sha: fileSha,
        branch: 'main'
      })
    });

    if (!res.ok) throw new Error((await res.json()).message);
    const data = await res.json();
    fileSha = data.content.sha;

    const s = document.getElementById('saveStatus');
    s.textContent = 'Vistað ✓';
    s.className = 'save-status saved';

    showToast('Vistað! Síðan uppfærist á ~30 sekúndum.', 'success');

    // Refresh preview after 30s
    setTimeout(() => {
      document.getElementById('previewFrame').src = 'https://nextgen-money.vercel.app?' + Date.now();
    }, 30000);

  } catch (err) {
    showToast('Villa: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Vista';
});

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 5000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextGen Money — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'asalif19/my-first-site',
          branch: 'main',
          base_url: 'https://nextgen-money.vercel.app',
          auth_endpoint: 'api/auth'
        },
        media_folder: 'nextgen-money/images',
        public_folder: '/images',
        load_config_file: false,
        collections: [
          {
            name: 'content',
            label: 'Efni síðunnar',
            files: [
              {
                label: 'Allt efni',
                name: 'content',
                file: 'nextgen-money/data/content.json',
                format: 'json',
                fields: [
                  {
                    label: 'Hero — Forsíða', name: 'hero', widget: 'object',
                    fields: [
                      { label: 'Lítill texti fyrir ofan', name: 'eyebrow', widget: 'string' },
                      { label: 'Undirtitill', name: 'subtitle', widget: 'string' },
                      { label: 'Takki texti', name: 'cta', widget: 'string' }
                    ]
                  },
                  {
                    label: 'HOME — Um síðuna', name: 'about', widget: 'object',
                    fields: [
                      { label: 'Kynningartexti', name: 'intro', widget: 'text' },
                      { label: 'Fyrir hvern?', name: 'for_whom', widget: 'text' },
                      { label: 'Af hverju fjármál skipta máli', name: 'why_matters', widget: 'text' },
                      { label: 'Markmið síðunnar', name: 'goal', widget: 'text' }
                    ]
                  },
                  {
                    label: 'HOW TO SAVE', name: 'save', widget: 'object',
                    fields: [
                      { label: 'Kort 1 — Titill', name: 'card1_title', widget: 'string' },
                      { label: 'Kort 1 — Texti', name: 'card1_text', widget: 'text' },
                      { label: 'Kort 2 — Titill', name: 'card2_title', widget: 'string' },
                      { label: 'Kort 2 — Texti', name: 'card2_text', widget: 'text' },
                      { label: 'Kort 3 — Titill', name: 'card3_title', widget: 'string' },
                      { label: 'Kort 3 — Texti', name: 'card3_text', widget: 'text' },
                      { label: 'Kort 4 — Titill', name: 'card4_title', widget: 'string' },
                      { label: 'Kort 4 — Texti', name: 'card4_text', widget: 'text' },
                      { label: 'Kort 5 — Titill', name: 'card5_title', widget: 'string' },
                      { label: 'Kort 5 — Texti', name: 'card5_text', widget: 'text' }
                    ]
                  },
                  {
                    label: 'BUDGET PLAN', name: 'budget', widget: 'object',
                    fields: [
                      { label: 'Hvað er budget?', name: 'what_text', widget: 'text' },
                      { label: 'Af hverju hjálpar budget?', name: 'why_text', widget: 'text' },
                      { label: 'Dæmi — Tekjur', name: 'example_income', widget: 'string' },
                      { label: 'Dæmi — Þarfir (50%)', name: 'example_needs', widget: 'string' },
                      { label: 'Dæmi — Lyst (30%)', name: 'example_wants', widget: 'string' },
                      { label: 'Dæmi — Sparnaður (20%)', name: 'example_savings', widget: 'string' }
                    ]
                  },
                  {
                    label: 'TIPS — Ráð', name: 'tips', widget: 'object',
                    fields: [
                      { label: 'Ráð 1 — Titill', name: 'tip1_title', widget: 'string' },
                      { label: 'Ráð 1 — Texti', name: 'tip1_text', widget: 'text' },
                      { label: 'Ráð 2 — Titill', name: 'tip2_title', widget: 'string' },
                      { label: 'Ráð 2 — Texti', name: 'tip2_text', widget: 'text' },
                      { label: 'Ráð 3 — Titill', name: 'tip3_title', widget: 'string' },
                      { label: 'Ráð 3 — Texti', name: 'tip3_text', widget: 'text' },
                      { label: 'Ráð 4 — Titill', name: 'tip4_title', widget: 'string' },
                      { label: 'Ráð 4 — Texti', name: 'tip4_text', widget: 'text' },
                      { label: 'Ráð 5 — Titill', name: 'tip5_title', widget: 'string' },
                      { label: 'Ráð 5 — Texti', name: 'tip5_text', widget: 'text' }
                    ]
                  },
                  {
                    label: 'EXTRA', name: 'extra', widget: 'object',
                    fields: [
                      { label: 'Markhópurinn', name: 'block1_text', widget: 'text' },
                      { label: 'Raunverulegt dæmi', name: 'block2_text', widget: 'text' },
                      { label: 'Af hverju núna?', name: 'block3_text', widget: 'text' },
                      { label: 'Tilvitnun', name: 'quote', widget: 'text' },
                      { label: 'Tilvitnun — Höfundur', name: 'quote_author', widget: 'string' }
                    ]
                  },
                  {
                    label: 'Footer', name: 'footer', widget: 'object',
                    fields: [
                      { label: 'Texti neðst', name: 'tagline', widget: 'string' }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</head>
<body></body>
</html>
